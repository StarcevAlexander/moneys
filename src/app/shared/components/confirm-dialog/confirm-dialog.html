<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>{{ data.message }}</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">{{ data.cancelText ?? 'Отмена' }}</button>
  <button mat-flat-button [class.confirm-dialog__danger]="data.danger" (click)="confirm()">
    {{ data.confirmText ?? 'Подтвердить' }}
  </button>
</mat-dialog-actions>
