<div class="shell">
  <header class="shell__bar">
    <button class="shell__settings" mat-icon-button (click)="openSettings()" aria-label="Настройки">
      <mat-icon>settings</mat-icon>
    </button>
    <div class="shell__brand">
      <div class="coin coin--sm"><span>M</span></div>
      <span class="shell__title">Moneys</span>
    </div>
    <span class="shell__spacer"></span>
    <span class="shell__user">
      <mat-icon inline>account_circle</mat-icon>
      {{ user()?.login }}
    </span>
    <button mat-icon-button (click)="logout()" aria-label="Выйти">
      <mat-icon>logout</mat-icon>
    </button>
  </header>

  <main class="shell__content">
    <router-outlet />
  </main>

  <nav class="shell__nav" aria-label="Основная навигация">
    @for (tab of tabs; track tab.path) {
      <a
        class="shell__tab"
        [routerLink]="tab.path"
        routerLinkActive="shell__tab--active"
        [attr.aria-label]="tab.label"
      >
        <mat-icon>{{ tab.icon }}</mat-icon>
        <span class="shell__tab-label">{{ tab.label }}</span>
      </a>
    }
  </nav>
</div>
