<!doctype html>
<html lang="ru" data-theme="emerald">
  <head>
    <meta charset="utf-8" />
    <title>Moneys</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d4f31" />
    <meta name="description" content="Moneys — денежный PWA-кабинет" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Moneys" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <app-root></app-root>
    <noscript>Для работы приложения включите JavaScript.</noscript>
    <script>
      // Перехватываем событие установки PWA как можно раньше — оно одноразовое
      // и может прилететь ещё до старта Angular.
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        window.__deferredInstallPrompt = event;
        window.dispatchEvent(new Event('pwa-install-available'));
      });
      window.addEventListener('appinstalled', function () {
        window.__deferredInstallPrompt = undefined;
      });
    </script>
  </body>
</html>
